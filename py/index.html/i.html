            `;
            document.getElementById('appContent').innerHTML = html;
        }

        function openDeadlineModal() {
            const projOpts = DB.projects.map(p => `<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('');
            document.getElementById('modalContainer').innerHTML = `
                <div class="modal-header"><h3>Новый дедлайн</h3><button class="btn btn-outline btn-sm" onclick="closeModal()"><i class="fas fa-times"></i></button></div>
                <div class="modal-body">
                    <div class="form-group"><label class="form-label">Название *</label><input id="dlTitle" class="form-input"></div>
                    <div class="form-group"><label class="form-label">Проект</label><select id="dlProject" class="form-select"><option value="">—</option>${projOpts}</select></div>
                    <div class="form-group"><label class="form-label">Дедлайн</label><input type="date" id="dlDue" class="form-input"></div>
                </div>
                <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">Отмена</button><button class="btn btn-primary" onclick="createDeadline()">Сохранить</button></div>
            `;
            document.getElementById('globalModal').style.display = 'flex';
        }

        function createDeadline() {
            const title = document.getElementById('dlTitle').value.trim();
            const due = document.getElementById('dlDue').value;
            if (!title || !due) { showToast('Заполните поля', 'error'); return; }
            DB.deadlines.push({ id: getNextId('deadlines'), title, projectId: parseInt(document.getElementById(
                    'dlProject').value) || null, dueDate: due, status: 'pending' });
            saveDB();
            closeModal();
            navigate('deadlines');
            showToast('Дедлайн добавлен', 'success');
        }

        function completeDeadline(id) { const d = DB.deadlines.find(dl => dl.id === id); if (d) { d.status =
                'completed';
                saveDB();
                navigate('deadlines');
                showToast('Дедлайн выполнен', 'success'); } }

        function deleteDeadline(id) { if (confirm('Удалить?')) { DB.deadlines = DB.deadlines.filter(d => d.id !== id);
                saveDB();
                navigate('deadlines');
                showToast('Удален', 'info'); } }

        function renderReports() {
            const html = `
                <div class="glass-card">
                    <div class="card-title"><i class="fas fa-file-alt"></i> Отчеты и выгрузки</div>
                    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;">
                        <button class="btn btn-primary" onclick="exportAllData()"><i class="fas fa-file-code"></i> Экспорт JSON</button>
                        <button class="btn btn-outline" onclick="generateKP()"><i class="fas fa-file-pdf"></i> КП (проект #1)</button>
                        <button class="btn btn-outline" onclick="generateNMA()"><i class="fas fa-file-alt"></i> НМА (проект #1)</button>
                    </div>
                    <p style="margin-top:14px;color:var(--text-muted);font-size:12px;">Сформируйте документы для первого проекта в списке.</p>
                </div>
            `;
            document.getElementById('appContent').innerHTML = html;
        }

        function generateKP() {
            const p = DB.projects[0];
            if (!p) return;
            const cust = DB.customers.find(c => c.id === p.customerId);
            const rSum = (p.resources || []).reduce((s, r) => s + (r.finalCost || 0), 0);
            const html =
                `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>КП — ${escapeHtml(p.name)}</title><style>body{font-family:'Inter',sans-serif;background:#ffffff;color:#111111;padding:30px;max-width:700px;margin:auto;}h1{color:#111111;}table{width:100%;border-collapse:collapse;margin:14px 0;}th,td{padding:8px 12px;border:1px solid rgba(0,0,0,0.06);text-align:left;}th{background:rgba(0,0,0,0.04);color:#111111;}.total{font-weight:bold;font-size:18px;color:#111111;}</style></head><body>
                <h1>Коммерческое предложение</h1><p>Заказчик: ${cust?escapeHtml(cust.name):'—'}</p><p>Проект: ${escapeHtml(p.name)}</p>
                <table><tr><th>Услуга</th><th>Кол-во</th><th>Стоимость</th></tr>${(p.resources||[]).map(r=>`<tr><td>${escapeHtml(r.serviceName||r.resName)}</td><td>${r.units} ед.</td><td>${formatMoney(r.finalCost)}</td></tr>`).join('')}</table>
                <p class="total">Итого: ${formatMoney(rSum)}</p>
                <p style="color:#777777;font-size:11px;margin-top:24px;">Сформировано в IQNIX.TECH Global Enterprise</p></body></html>`;
            const blob = new Blob([html], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `KP_${p.name.replace(/\s+/g,'_')}.html`;
            a.click();
            showToast('КП сформирован', 'success');
        }

        function generateNMA() {
            const p = DB.projects[0];
            if (!p) return;
            const rCost = (p.resources || []).reduce((s, r) => s + (r.selfCost || 0), 0);
            const html =
                `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>НМА — ${escapeHtml(p.name)}</title><style>body{font-family:'Inter',sans-serif;background:#ffffff;color:#111111;padding:30px;max-width:700px;margin:auto;}h1{color:#111111;}table{width:100%;border-collapse:collapse;margin:14px 0;}th,td{padding:8px 12px;border:1px solid rgba(0,0,0,0.06);text-align:left;}th{background:rgba(0,0,0,0.04);color:#111111;}.total{font-weight:bold;font-size:18px;color:#111111;}</style></head><body>
                <h1>Стоимость НМА</h1><p>Проект: ${escapeHtml(p.name)}</p>
                <table><tr><th>Ресурс</th><th>Кол-во</th><th>Себестоимость</th></tr>${(p.resources||[]).map(r=>`<tr><td>${escapeHtml(r.serviceName||r.resName)}</td><td>${r.units} ед.</td><td>${formatMoney(r.selfCost)}</td></tr>`).join('')}</table>
                <p class="total">Итого себестоимость НМА: ${formatMoney(rCost)}</p>
                <p style="color:#777777;font-size:11px;margin-top:24px;">Сформировано в IQNIX.TECH Global Enterprise</p></body></html>`;
            const blob = new Blob([html], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `NMA_${p.name.replace(/\s+/g,'_')}.html`;
            a.click();
            showToast('НМА сформирован', 'success');
        }

        function renderNotifications() {
            const notifs = DB.notifications;
            const unread = notifs.filter(n => !n.read).length;
            const html = `
                <div class="glass-card">
                    <div class="card-header">
                        <div>
                            <div class="card-title"><i class="fas fa-bell"></i> Уведомления ${unread>0?`<span class="badge badge-red">${unread}</span>`:''}</div>
                            <div class="card-subtitle">Всего: ${notifs.length}</div>
                        </div>
                        <div style="display:flex;gap:6px;">
                            <button class="btn btn-outline btn-sm" onclick="markAllRead()"><i class="fas fa-check-double"></i> Прочитать все</button>
                            <button class="btn btn-danger btn-sm" onclick="clearNotifications()"><i class="fas fa-trash"></i> Очистить</button>
                        </div>
                    </div>
                    ${notifs.length===0?'<div class="empty-state"><i class="fas fa-bell-slash" style="font-size:36px;"></i><h4>Нет уведомлений</h4><p>Все уведомления будут отображаться здесь</p></div>':
                    notifs.slice().reverse().map(n=>`
                        <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.04);${n.read?'opacity:0.3;':''}">
                            <div>
                                <strong>${escapeHtml(n.title)}</strong>
                                <div style="font-size:12px;color:var(--text-secondary);">${escapeHtml(n.message)}</div>
                                <div style="font-size:10px;color:var(--text-muted);">${formatDateTime(n.createdAt)}</div>
                            </div>
                            <div>
                                ${!n.read?`<button class="btn btn-success btn-sm" onclick="markNotifRead(${n.id})"><i class="fas fa-check"></i></button>`:''}
                                <button class="btn btn-danger btn-sm" onclick="deleteNotif(${n.id})"><i class="fas fa-times"></i></button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            document.getElementById('appContent').innerHTML = html;
        }

        function markNotifRead(id) {
            const n = DB.notifications.find(no => no.id === id);
            if (n) { n.read = true;
                saveDB();
                navigate('notifications');
                showToast('Отмечено прочитанным', 'success'); }
        }

        function markAllRead() {
            DB.notifications.forEach(n => n.read = true);
            saveDB();
            navigate('notifications');
            showToast('Все уведомления прочитаны', 'success');
        }

        function clearNotifications() {
            if (confirm('Удалить все уведомления?')) { DB.notifications = [];
                saveDB();
                navigate('notifications');
                showToast('Уведомления очищены', 'info'); }
        }

        function deleteNotif(id) {
            DB.notifications = DB.notifications.filter(n => n.id !== id);
            saveDB();
            navigate('notifications');
            showToast('Удалено', 'info');
        }

        function renderSettings() {
            const s = DB.settings;
            const html = `
                <div class="glass-card">
                    <div class="card-title"><i class="fas fa-cog"></i> Настройки системы</div>
                    <div class="form-group"><label class="form-label">Название компании</label><input id="setCompany" class="form-input" value="${escapeHtml(s.companyName||'')}"></div>
                    <div class="form-row">
                        <div class="form-group"><label class="form-label">ИНН</label><input id="setINN" class="form-input" value="${s.companyINN||''}"></div>
                        <div class="form-group"><label class="form-label">Email для отчетов</label><input id="setEmail" class="form-input" value="${s.reportEmail||''}"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label class="form-label">Директор</label><input id="setDirector" class="form-input" value="${escapeHtml(s.directorName||'')}"></div>
                        <div class="form-group"><label class="form-label">Должность</label><input id="setDirectorPos" class="form-input" value="${escapeHtml(s.directorPosition||'')}"></div>
                    </div>
                    <button class="btn btn-primary" onclick="saveSettings()"><i class="fas fa-save"></i> Сохранить</button>
                    <hr style="border:0;border-top:1px solid rgba(0,0,0,0.04);margin:20px 0;">
                    <div style="display:flex;gap:10px;flex-wrap:wrap;">
                        <button class="btn btn-outline" onclick="exportAllData()"><i class="fas fa-download"></i> Экспорт JSON</button>
                        <button class="btn btn-danger" onclick="resetAllData()"><i class="fas fa-exclamation-triangle"></i> Сбросить все данные</button>
                    </div>
                </div>
            `;
            document.getElementById('appContent').innerHTML = html;
        }

        function saveSettings() {
            DB.settings.companyName = document.getElementById('setCompany').value;
            DB.settings.companyINN = document.getElementById('setINN').value;
            DB.settings.reportEmail = document.getElementById('setEmail').value;
            DB.settings.directorName = document.getElementById('setDirector').value;
            DB.settings.directorPosition = document.getElementById('setDirectorPos').value;
            saveDB();
            showToast('Настройки сохранены', 'success');
        }

        function resetAllData() {
            if (confirm('ВНИМАНИЕ! Все данные будут сброшены к значениям по умолчанию. Продолжить?')) {
                localStorage.removeItem(LS_KEY);
                loadDB();
                showToast('Данные сброшены', 'info');
                navigate('dashboard', false);
            }
        }

        // ================================================================
        // INIT
        // ================================================================
        document.addEventListener('click', function(e) { if (e.target.classList.contains('modal-overlay')) closeModal(); });
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

        loadDB();
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('appScreen').style.display = 'none';

        
    </script>
</body>
</html>
